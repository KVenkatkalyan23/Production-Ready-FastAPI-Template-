[pytest]
minversion = 8.0
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = --strict-markers --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70
markers =
    unit: fast isolated tests
    integration: API and DB-backed integration tests
